services:
  backend:
    build: .
    env_file: .env
    restart: unless-stopped
    environment:
      # Override retrieval URL to use Docker host so the backend
      # can reach the KI-4-KMU retrieval service running on the host machine.
      - RETRIEVAL_URL=http://host.docker.internal:8001/v1
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - app-network

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://backend:8000/v1
      - OPENAI_API_KEY=dummy
      - WEBUI_AUTH=false
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  open-webui-data:

networks:
  app-network:
    driver: bridge
