services:
  backend:
    build: .
    env_file: .env
    restart: unless-stopped
    networks:
      - app-network

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://backend:8000/v1
      - OPENAI_API_KEY=dummy
      - WEBUI_AUTH=false
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  open-webui-data:

networks:
  app-network:
    driver: bridge
